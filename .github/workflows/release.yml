name: release

# Tag-triggered CD: push an annotated tag `vX.Y.Z` and this workflow guards
# version consistency, re-verifies the tagged commit, builds sdist+wheel, and
# publishes the GitHub release with the tag's CHANGELOG section as notes.
# Deliberately NO PyPI: this is a fork of dssg/featurizer and the name is
# generic — GitHub releases on the fork are the distribution channel.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  guard:
    name: tag == pyproject version, CHANGELOG section exists
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: check version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          echo "tag=$TAG pyproject=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          if ! grep -q "^## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' section"
            exit 1
          fi

  verify:
    name: re-verify the tagged commit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: featurizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/featurizer_test
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --extra parquet
      - run: uv run pytest -q -m "not integration"
      - run: uv run basedpyright
      - run: uv run pytest -q -m "integration and not slow"

  publish:
    name: build + GitHub release
    needs: [guard, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv build
      - name: extract CHANGELOG section as release notes
        run: |
          python3 - "$GITHUB_REF_NAME" <<'EOF'
          import re
          import sys

          tag = sys.argv[1].lstrip("v")
          text = open("CHANGELOG.md").read()
          match = re.search(
              rf"^## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              text,
              re.MULTILINE | re.DOTALL,
          )
          if match is None:
              sys.exit(f"No CHANGELOG section for {tag}")
          open("release-notes.md", "w").write(match.group(1).strip() + "\n")
          EOF
          cat release-notes.md
      - name: create GitHub release with dist assets
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Featurizer ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes.md
