name: pages

# Publishes the project site to GitHub Pages (build_type: workflow):
# a hand-written landing page (site/index.html) plus the committed
# live-DB validation artifacts (specs/) and images (docs/images/).
on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "specs/**"
      - "docs/images/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Assemble site
        run: |
          mkdir -p _site/specs _site/images
          cp site/index.html _site/
          cp -R specs/. _site/specs/
          cp -R docs/images/. _site/images/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
