name: test

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: fast tests + types
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv sync --extra parquet
      - name: pytest (fast tier, no database) + coverage floor
        run: uv run pytest -q -m "not integration" --cov=featurizer --cov-report=term --cov-fail-under=70
      - name: basedpyright
        run: uv run basedpyright
      - name: validate shipped example configs
        # 04-custom-primitives is excluded by design: its config references
        # custom primitives (log1p, zscore, bin) that run_example.py registers
        # at runtime, so the standalone CLI validator cannot know them.
        run: |
          for cfg in examples/0*/config.yaml; do
            case "$cfg" in *04-custom-primitives*) continue ;; esac
            echo "== $cfg"
            uv run python -m featurizer validate "$cfg"
          done

  package:
    name: packaging (build + twine check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv build
      - run: uvx twine check dist/*

  integration:
    name: integration (ephemeral PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: featurizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/featurizer_test
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv sync --extra parquet
      # The realistic-dataset tier ("integration and slow") needs `just seed`,
      # which downloads external datasets; it runs locally, not in CI. CI covers
      # the TEMP-table integration tests that execute generated SQL on a real
      # PostgreSQL without seeding — including the executed default-active
      # primitive tests in test_default_primitives_execution.py, which assert
      # real feature values (not just "does it parse") and so catch dialect /
      # window-frame bugs that string-shape tests miss.
      - name: pytest (integration, no seeding required)
        run: uv run pytest -q -m "integration and not slow"
