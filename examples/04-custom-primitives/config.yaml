# Financial analytics: Accounts with Transactions

target: accounts
max_depth: 2

intervals:
  - P7D   # Last 7 days
  - P30D  # Last 30 days

# Mix built-in primitives with the custom ones registered by
# custom_primitives.py (range, p95, log1p, zscore, bin). A focused set keeps the
# matrix small; the custom primitives must be registered before this config is
# loaded (run_example.py does that).
aggregations:
  - count
  - mean
  - range
  - p95
transformations:
  - identity
  - log1p
  - zscore
  - bin

entities:
  - alias: accounts
    id: account_id
    table: accounts
    temporal_ix: open_date
    variables:
      account_type:
        type: categorical
      credit_limit:
        type: numeric

  - alias: transactions
    id: transaction_id
    table: transactions
    temporal_ix: transaction_date
    variables:
      amount:
        type: numeric
      transaction_type:
        type: categorical

relationships:
  - parent:
      entity: accounts
      key: account_id
    child:
      entity: transactions
      key: account_id
