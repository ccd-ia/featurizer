# E-commerce feature generation: Customers with Orders

target: customers
max_depth: 2

intervals:
  - P7D   # Last 7 days
  - P30D  # Last 30 days

# A focused primitive set keeps the feature matrix small and readable. The full
# default set would synthesize thousands of columns — past PostgreSQL's 1664
# per-row limit and far past anything legible in a tutorial.
aggregations:
  - count
  - sum
  - mean
  - min
  - max
  - stddev
  - nunique
transformations:
  - identity
  - abs

entities:
  - alias: customers
    id: customer_id
    table: customers
    temporal_ix: signup_date
    variables:
      country:
        type: categorical
      age:
        type: numeric

  - alias: orders
    id: order_id
    table: orders
    temporal_ix: order_date
    variables:
      amount:
        type: numeric
      status:
        type: categorical

relationships:
  - parent:
      entity: customers
      key: customer_id
    child:
      entity: orders
      key: customer_id
