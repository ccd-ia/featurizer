[project]
name = "featurizer"
version = "0.1.0"
description = "DFS implementation for PostgreSQL temporal datasources"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
  "icecream",
  "loguru",
  "pandas",
  "psycopg",
  "pyyaml",
  "records",
]

[tool.uv]
dev-dependencies = [
    "basedpyright>=1.31.7",
    "jupyter-console>=6.6.3",
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling>=1.13"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["featurizer"]
