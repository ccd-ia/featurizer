# Small, executable config for the rendered-SQL snapshot test.
#
# A deliberately narrow primitive selection keeps the snapshot readable while
# still exercising the key code paths end to end: parent->child aggregation,
# interval filters, the identity passthrough (synth columns referenced by name),
# a genuine transform (abs), materialization of the reached child entity, and
# the as-of direct join (point-in-time pull with a grace window). This config
# executes cleanly against PostgreSQL (validated in the integration harness).
target: patients
max_depth: 2

intervals:
  - P1D

aggregations:
  - count
  - sum
  - mean
  - median
transformations:
  - identity
  - abs

entities:
  - alias: patients
    id: patient_id
    table: analytics.patients
    temporal_ix: registered_at
    variables:
      age:
        type: numeric
  - alias: visits
    id: visit_id
    table: analytics.visits
    temporal_ix: visited_at
    variables:
      duration_minutes:
        type: numeric
  - alias: care_plans
    id: plan_id
    table: analytics.care_plans
    temporal_ix: effective_at
    variables:
      patient_id:
        type: index
      risk_score:
        type: numeric

relationships:
  - parent:
      entity: patients
      key: patient_id
    child:
      entity: visits
      key: patient_id
  - parent:
      entity: care_plans
      key: patient_id
    child:
      entity: patients
      key: patient_id
    temporal:
      mode: as_of
      grace: P14D
