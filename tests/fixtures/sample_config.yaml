# Minimal config used for registry and planner tests.
target: patients
max_depth: 2

intervals:
  - P1D

entities:
  - alias: patients
    id: patient_id
    table: analytics.patients
    temporal_ix: registered_at
    variables:
      age:
        type: numeric
  - alias: visits
    id: visit_id
    table: analytics.visits
    temporal_ix: visited_at
    variables:
      duration_minutes:
        type: numeric
  - alias: care_plans
    id: plan_id
    table: analytics.care_plans
    temporal_ix: effective_at
    variables:
      patient_id:
        type: index
      risk_score:
        type: numeric

relationships:
  - parent:
      entity: patients
      key: patient_id
    child:
      entity: visits
      key: patient_id
  - parent:
      entity: care_plans
      key: patient_id
    child:
      entity: patients
      key: patient_id
    temporal:
      mode: as_of
      grace: P14D
