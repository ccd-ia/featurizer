<text x="945.0" y="212" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#1c1c1a">AGG_g over W(t₀)</text>
<text x="945.0" y="240" text-anchor="middle" font-size="11.5" fill="#56544e">same windows, same verbs,</text>
<text x="945.0" y="256" text-anchor="middle" font-size="11.5" fill="#56544e">same causal &amp; cost discipline</text>
<text x="40" y="388" font-size="12" fill="#56544e"><tspan font-weight="bold" fill="#1c1c1a">Caveat that travels with them:</tspan> the heavier φ is, the worse the leakage. A graph metric is non-local (one future edge moves it);</text>
<text x="40" y="408" font-size="12" fill="#56544e">a fitted vocabulary or a post-t₀ embedding model imports the future. Snapshot the graph and refit text models strictly before t₀.</text>
