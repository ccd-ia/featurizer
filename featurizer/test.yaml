target: customers

# intervals are global
intervals: ['1 day', '2 days', '3 days', 'P1W', 'P1M', '1 year', '1 year 2 months', 'P1M3D']

# aggregations:
#   whitelist: *
#   #blacklist:

# transformations:
#   #whitelist:
#   blacklist: exp, log

entities:
  -
    alias: customers
    id: customer_id
    table: customers_tbl
    variables:
      gender:
        type: categorical
      age:
        type: numeric

  -
    alias: orders
    id: order_id
    temporal_ix: date
    table: orders_tbl
    variables:


  -
    alias: items_ordered
    id: ~
    table: items_ordered_tbl
    variables:
      quantity:
        type: numeric

  -
    alias: products
    id: product_id
    table: products_tbl
    variables:
      price:
        type: numeric
      colour:
        type: categorical

relationships:
  -
    parent:
      entity: customers
      key: customer_id
    child:
      entity: orders
      key: customer_id

  -
    parent:
      entity: products
      key: product_id
    child:
      entity: items_ordered
      key: product_id

  -
    parent:
      entity: orders
      key: order_id
    child:
      entity: items_ordered
      key: order_id
