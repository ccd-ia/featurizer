target: customers

entities:
  -
    alias: customers
    id: customer_id
    table: customers_tbl
    variables:
      gender:
        type: categorical
      age:
        type: numeric

  -
    alias: orders
    id: order_id
    temporal_ix: date
    table: orders_tbl
    variables:

relationships:
  -
    parent:
      entity: customers
      key: customer_id
    child:
      entity: orders
      key: customer_id
