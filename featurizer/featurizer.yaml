# There is a table called as_of_dates

target: patients
max_depth: 2

intervals:
  - P1W
  - P2W
  - P1M

# whitelist:
#   transformations: ['']
#   aggregations: ['count']

# blacklist:
#   transformations: ['']
#   aggregations: ['count']

entities:
  -
    alias: patients
    id: patient
    table: semantic.patients
    temporal_ix: registered_at
    variables:
      gender:
        type: categorical
  -
    alias: measurements
    id: ~
    table: semantic.measurements_view
    temporal_ix: measured_at   # This is the event time
    spatial_ix: ~
    variables:
      peso:
        type: numeric
        intervals:
          - P1D
          - P3D
          - P1W
      frecuencia_cardiaca:
        type: numeric
        intervals:
          - P1D
          - P3D
          - P1W

  # -
  #   alias: gender
  #   id: gender
  #   table: catalogs.gender
  #   variables:
  #     description:
  #       type: categorical

  -
    alias: consultations
    id: medical_consultation
    table: semantic.medical_consultations
    temporal_ix: enter_date # Event time
    spatial_ix: ~
    variables:
      health_status:
        type: text
        intervals:
          - P1W
          - P2W
          - P1M
  -
    alias: care_plans
    id: care_plan
    table: semantic.care_plans
    temporal_ix: effective_at
    variables:
      plan_score:
        type: numeric
      plan_type:
        type: categorical

relationships:
  -
    parent:
      entity: patients
      key: patient
    child:
      entity: measurements
      key: patient

  # -
  #   parent:
  #     entity: gender
  #     key: gender
  #   child:
  #     entity: patients
  #     key: gender

  -
    parent:
      entity: patients
      key: patient
    child:
      entity: consultations
      key: patient
  -
    parent:
      entity: care_plans
      key: patient
    child:
      entity: patients
      key: patient
    temporal:
      mode: as_of
      grace: P21D
