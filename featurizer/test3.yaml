target: items_ordered

entities:
  -
    alias: items_ordered
    id: ~
    table: items_ordered_tbl
    variables:
      quantity:
        type: numeric

  -
    alias: products
    id: product_id
    table: products_tbl
    variables:
      price:
        type: numeric
      colour:
        type: categorical

relationships:

  -
    parent:
      entity: products
      key: product_id
    child:
      entity: items_ordered
      key: product_id
